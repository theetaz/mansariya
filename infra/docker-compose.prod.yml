services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: masariya-backend
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT:-9900}
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      VALHALLA_URL: http://valhalla:9992
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    ports:
      - "${BACKEND_PORT:-9900}:${BACKEND_PORT:-9900}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: masariya-nginx
    ports:
      - "${NGINX_PORT:-9000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: masariya-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-masariya}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: masariya-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valhalla:
    build:
      context: .
      dockerfile: Dockerfile.valhalla
    container_name: masariya-valhalla
    volumes:
      - valhalla_tiles:/custom_files
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9992/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  valhalla_tiles:
