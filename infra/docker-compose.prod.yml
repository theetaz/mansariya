services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: masariya-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-masariya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-masariya}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-masariya}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: masariya-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: masariya-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "9900"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgres://${POSTGRES_USER:-masariya}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-masariya}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      VALHALLA_URL: "http://valhalla:9992"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
    ports:
      - "127.0.0.1:9900:9900"

  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.migrate
    container_name: masariya-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-masariya}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-masariya}?sslmode=disable"
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: masariya-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  redisdata:
