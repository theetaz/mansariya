services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: masariya-postgres
    environment:
      POSTGRES_USER: masariya
      POSTGRES_PASSWORD: masariya
      POSTGRES_DB: masariya
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masariya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: masariya-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  valhalla:
    build:
      context: .
      dockerfile: Dockerfile.valhalla
    container_name: masariya-valhalla
    ports:
      - "8002:8002"
    volumes:
      - valhalla_tiles:/custom_files
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  pgdata:
  redisdata:
  valhalla_tiles:
