services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: masariya-postgres
    environment:
      POSTGRES_USER: masariya
      POSTGRES_PASSWORD: masariya
      POSTGRES_DB: masariya
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masariya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: masariya-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  valhalla:
    build:
      context: .
      dockerfile: Dockerfile.valhalla
    container_name: masariya-valhalla
    ports:
      - "9992:9992"
    volumes:
      - valhalla_tiles:/custom_files
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9992/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: masariya-nominatim
    environment:
      PBF_URL: https://download.geofabrik.de/asia/sri-lanka-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/asia/sri-lanka-updates/
      NOMINATIM_PASSWORD: masariya
      IMPORT_STYLE: full
    ports:
      - "9990:9990"
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    shm_size: 1g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9990/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s

volumes:
  pgdata:
  redisdata:
  valhalla_tiles:
  nominatim_data:
