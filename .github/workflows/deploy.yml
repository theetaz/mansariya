name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/mansariya

            # Pull latest code
            git checkout main
            git pull origin main

            # Ensure dependencies are up first
            cd infra
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres redis

            # Build fresh images
            docker compose -f docker-compose.prod.yml --env-file .env.prod build backend migrate

            # Run migrations before starting the new backend
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm migrate

            # Bootstrap admin user (safe to re-run — skips if users exist)
            # Only runs if ADMIN_PASSWORD is set in .env.prod
            if grep -q "^ADMIN_PASSWORD=" .env.prod 2>/dev/null; then
              source .env.prod
              if [ -n "$ADMIN_PASSWORD" ]; then
                docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm backend \
                  /bootstrap-admin \
                  -email "${ADMIN_EMAIL:-admin@mansariya.lk}" \
                  -password "$ADMIN_PASSWORD" \
                  -name "${ADMIN_NAME:-Super Admin}"
              else
                echo "⚠️  ADMIN_PASSWORD is empty — skipping bootstrap. Run manually: make bootstrap-admin"
              fi
            else
              echo "⚠️  ADMIN_PASSWORD not set — skipping bootstrap. Run manually: make bootstrap-admin"
            fi

            # Start application services and wait for health
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d backend nginx
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps

            if ! curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 2 http://127.0.0.1:9900/health; then
              echo "Backend health check failed"
              docker compose -f docker-compose.prod.yml --env-file .env.prod logs backend --tail=200
              exit 1
            fi

            if ! curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 2 http://127.0.0.1/health; then
              echo "Nginx health check failed"
              docker compose -f docker-compose.prod.yml --env-file .env.prod logs nginx --tail=200
              docker compose -f docker-compose.prod.yml --env-file .env.prod logs backend --tail=200
              exit 1
            fi

            # Clean up old images
            docker image prune -f

            echo "✅ Backend deployment complete"
